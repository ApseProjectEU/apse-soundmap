<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>APSE Ecological Sound Map – Lama dei Peligni</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  html, body { margin:0; padding:0; height:100%; font-family:sans-serif; }
  #map { height:70vh; width:100%; }
  .controls { padding:1rem; background:#fff; }

  .badge-official {
    display:inline-block; background:#007bff; color:#fff;
    padding:4px 10px; border-radius:6px; font-size:0.75rem;
    margin-bottom:6px; font-weight:600;
  }

  .legend {
    margin-top: 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    font-size: 0.85rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-color {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background:#007bff;
  }
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
  <h2>APSE Ecological Sound Map – Lama dei Peligni</h2>
  <p>All official markers represent biophonic recordings. Users can add their own markers by clicking on the map.</p>

  <h3>Upload your audio</h3>

  <label>Title</label><br>
  <input id="title" style="width:100%;"><br><br>

  <label>Description</label><br>
  <textarea id="description" style="width:100%;"></textarea><br><br>

  <label>Archive.org URL</label><br>
  <input id="archiveUrl" style="width:100%;"><br><br>

  <button id="addMarker">Add user marker</button>

  <p id="coords">Click on the map to select coordinates</p>

  <h3>Legend</h3>
  <div class="legend">
    <div class="legend-item">
      <span class="legend-color"></span> Biophony (official & user markers)
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ---------------------------
// MAP
// ---------------------------
const map = L.map("map").setView([42.043, 14.188], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

// ---------------------------
// PIN ICON (Google Maps style)
// ---------------------------
const pinIcon = L.icon({
  iconUrl: "https://maps.gstatic.com/mapfiles/api-3/images/spotlight-poi2_hdpi.png",
  iconSize: [27, 43],
  iconAnchor: [13, 42],
  popupAnchor: [0, -40]
});

// ---------------------------
// OFFICIAL MARKERS (LOADED FROM JSON)
// ---------------------------
const RAW = "https://raw.githubusercontent.com/ApseProjectEU/apse-soundmap/main/sounds/biophony/";

fetch("data/official-markers.json")
  .then(response => response.json())
  .then(data => {
    data.forEach(m => {
      const marker = L.marker([m.lat, m.lng], { icon: pinIcon });

      const audioUrl = RAW + m.filename;

      marker.bindPopup(`
        <div class="badge-official">APSE Official Sound Marker</div>
        <b>${m.title}</b><br>
        ${m.description}<br><br>
        <audio controls style="width:100%;">
          <source src="${audioUrl}" type="audio/mpeg">
        </audio>
      `);

      marker.on("click", () => {
        map.setView([m.lat, m.lng], 16, { animate: true });
      });

      marker.addTo(map);
    });
  });

// ---------------------------
// USER MARKERS (ALSO PIN ICON)
// ---------------------------
let selectedLat = null;
let selectedLng = null;

map.on("click", e => {
  selectedLat = e.latlng.lat;
  selectedLng = e.latlng.lng;
  document.getElementById("coords").innerText =
    "Coordinates: " + selectedLat.toFixed(5) + ", " + selectedLng.toFixed(5);
});

document.getElementById("addMarker").onclick = () => {
  if (!selectedLat) {
    alert("Click on the map first.");
    return;
  }

  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const url = document.getElementById("archiveUrl").value;

  const marker = L.marker([selectedLat, selectedLng], { icon: pinIcon });

  marker.bindPopup(`
    <b>${title}</b><br>
    ${description}<br><br>
    <iframe src="https://archive.org/embed/${url.split('/').pop()}"
            width="100%" height="120"></iframe>
  `);

  // 🔥 ZOOM TO MARKER
  marker.on("click", () => {
    map.setView([selectedLat, selectedLng], 16, { animate: true });
  });

  marker.addTo(map);
};
</script>

</body>
</html>
