<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSE Sound Map - TEST</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Arial',sans-serif;height:100vh;overflow:hidden;background:#f8fdfb}
#map{width:100%;height:100vh}
.popup-title{font-size:18px;font-weight:bold;margin-bottom:10px;color:#145C3A}
.popup-desc{font-size:14px;color:#555;margin-bottom:14px;line-height:1.6}
.popup-audio{margin:14px 0;background:#f8f8f8;padding:12px;border-radius:8px}
.popup-audio audio{width:100%;margin-top:6px}
.category-badge{display:inline-block;padding:6px 14px;border-radius:14px;font-size:11px;font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px;background:#cce5ff;color:#004085}
.leaflet-popup-content-wrapper{border-radius:14px;padding:4px}
.leaflet-popup-content{margin:20px;min-width:300px}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([42.042,14.188],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap | APSE Project'
}).addTo(map);

const driveUrl='https://drive.google.com/uc?export=download&id=1LE1OEjcD8VsJ52FyIvRKiwNgsRixGt0S';

const marker=L.marker([42.042,14.188]).addTo(map);
const popup=`
<span class="category-badge">Biophony - TEST</span>
<div class="popup-title">Test Audio Lama dei Peligni</div>
<div class="popup-desc">Questo è un test per verificare che l'audio Google Drive funzioni nella mappa.</div>
<div class="popup-audio">
<audio controls preload="metadata">
<source src="${driveUrl}" type="audio/mpeg">
<source src="${driveUrl}" type="audio/wav">
<source src="${driveUrl}" type="audio/ogg">
Audio non supportato
</audio>
</div>`;
marker.bindPopup(popup,{maxWidth:340});
marker.openPopup();
</script>
</body>
</html>
