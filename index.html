<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSE Final Test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;height:100vh;overflow:hidden}
#map{width:100%;height:100vh}
.leaflet-popup-content{margin:20px;min-width:320px}
.popup-audio iframe{width:100%;height:80px;border:none;border-radius:8px;margin:10px 0}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([42.042,14.188],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const driveId='1LE1OEjcD8VsJ52FyIvRKiwNgsRixGt0S';
const driveEmbed=`https://drive.google.com/file/d/${driveId}/preview`;

const marker=L.marker([42.042,14.188]).addTo(map);
const popup=`
<strong>Test Google Drive Embed</strong>
<div class="popup-audio">
<iframe src="${driveEmbed}" allow="autoplay"></iframe>
</div>`;
marker.bindPopup(popup,{maxWidth:350});
marker.openPopup();
</script>
</body>
</html>
