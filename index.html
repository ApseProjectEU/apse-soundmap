<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APSE Archive Test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;height:100vh;overflow:hidden;background:#f8fdfb}
#map{width:100%;height:100vh}
.leaflet-popup-content-wrapper{border-radius:12px;padding:4px}
.leaflet-popup-content{margin:18px;min-width:320px}
.popup-title{font-size:17px;font-weight:bold;margin-bottom:8px;color:#145C3A}
.popup-desc{font-size:14px;color:#555;margin-bottom:12px;line-height:1.5}
.popup-audio{margin:12px 0}
.popup-audio iframe{width:100%;border:none;border-radius:6px}
</style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map=L.map('map').setView([42.042,14.188],15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap | APSE'
}).addTo(map);

const embedUrl='https://archive.org/embed/12-wind-82kmh-antarctica/10_piano-sound-effect.mp3';

const marker=L.marker([42.042,14.188]).addTo(map);
const popup=`
<div class="popup-title">Test Archive.org Audio</div>
<div class="popup-desc">Player Archive.org integrato nel popup</div>
<div class="popup-audio">
<iframe src="${embedUrl}" width="100%" height="50" frameborder="0" webkitallowfullscreen="true" mozallowfullscreen="true" allowfullscreen></iframe>
</div>`;
marker.bindPopup(popup,{maxWidth:350});
marker.openPopup();
</script>
</body>
</html>
