<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>APSE Ecological Sound Map – Lama dei Peligni</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
    }

    #map {
      width: 100%;
      height: 70vh;
    }

    .controls {
      padding: 1rem 1.5rem 1.5rem;
      background: #ffffff;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.06);
    }

    .controls h1 {
      margin: 0 0 0.5rem;
      font-size: 1.4rem;
      font-weight: 600;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.75rem 1rem;
      margin-top: 0.75rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.85rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 0.4rem 0.5rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

    .btn-primary {
      padding: 0.5rem 0.9rem;
      border-radius: 4px;
      border: none;
      background: #007bff;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .legend {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      font-size: 0.8rem;
      align-items: center;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    /* 🔥 NUOVO BADGE ELEGANTE */
    .badge-official {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      background: #000;
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.4px;
      border: 1px solid rgba(255,255,255,0.15);
      margin-bottom: 6px;
      font-family: "Segoe UI", sans-serif;
    }

    .popup-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .popup-description {
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
    }

    .delete-btn {
      margin-top: 0.4rem;
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      border-radius: 4px;
      border: none;
      background: #dc3545;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="controls">
    <h1>APSE Ecological Sound Map – Lama dei Peligni</h1>

    <div class="form-grid">
      <div class="form-group">
        <label>Title</label>
        <input id="title" type="text" />
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="description"></textarea>
      </div>

      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="biophony">Biophony</option>
          <option value="geophony">Geophony</option>
          <option value="anthrophony">Anthrophony</option>
          <option value="noise-pollution">Noise Pollution</option>
          <option value="ecological-soundscapes">Ecological Soundscapes</option>
        </select>
      </div>

      <div class="form-group">
        <label>Archive.org URL</label>
        <input id="archiveUrl" type="url" />
      </div>

      <div class="form-group">
        <label>Coordinates</label>
        <div id="coordsDisplay">Click on the map</div>
        <input type="hidden" id="lat" />
        <input type="hidden" id="lng" />
      </div>

      <button id="addMarkerBtn" class="btn-primary">Add user marker</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const categoryStyles = {
      biophony: { color: "#007bff", radius: 8 },
      geophony: { color: "#28a745", radius: 8 },
      anthrophony: { color: "#fd7e14", radius: 8 },
      "noise-pollution": { color: "#dc3545", radius: 8 },
      "ecological-soundscapes": { color: "#6f42c1", radius: 8 }
    };

    const map = L.map("map").setView([42.043, 14.188], 13);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

    /* 🔥 NUOVA ICONA UFFICIALE NERA */
    const officialIcon = L.icon({
      iconUrl: "https://maps.gstatic.com/mapfiles/ms2/micons/black.png",
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -32]
    });

    /* 🔥 MARKER UFFICIALI */
    function createOfficialMarker(data) {
      const audioUrl = "sounds/biophony/" + data.filename;

      const marker = L.marker([data.lat, data.lng], { icon: officialIcon });

      const popupHtml = `
        <div>
          <div class="badge-official">APSE Official Sound Marker</div>
          <div class="popup-title">${data.title}</div>
          <div class="popup-description">${data.description}</div>

          <audio controls style="width:100%;">
            <source src="${audioUrl}" type="audio/mpeg" />
          </audio>

          <div style="font-size:0.75rem; margin-top:6px;">
            Lat: ${data.lat.toFixed(5)}, Lng: ${data.lng.toFixed(5)}
          </div>
        </div>
      `;

      marker.bindPopup(popupHtml);
      marker.addTo(map);
    }

    fetch("data/official-markers.json")
      .then(r => r.json())
      .then(list => list.forEach(createOfficialMarker));

    /* 🔥 MARKER UTENTE */
    function archiveToEmbed(url) {
      try {
        const u = new URL(url);
        if (u.hostname.includes("archive.org")) {
          const parts = u.pathname.split("/").filter(Boolean);
          const idx = parts.indexOf("details");
          if (idx !== -1 && parts[idx + 1]) {
            return "https://archive.org/embed/" + parts[idx + 1];
          }
        }
      } catch {}
      return null;
    }

    function createUserMarker(lat, lng, data) {
      const style = categoryStyles[data.category];
      const marker = L.circleMarker([lat, lng], {
        radius: style.radius,
        color: style.color,
        fillColor: style.color,
        fillOpacity: 0.9
      });

      const embed = archiveToEmbed(data.archiveUrl);

      const popupHtml = `
        <div>
          <div class="popup-title">${data.title}</div>
          <div class="popup-description">${data.description}</div>

          ${
            embed
              ? `<iframe src="${embed}" width="100%" height="120"></iframe>`
              : `<a href="${data.archiveUrl}" target="_blank">Open audio</a>`
          }

          <button class="delete-btn" onclick="map.removeLayer(window.m${lat}${lng})">
            Delete
          </button>
        </div>
      `;

      window["m" + lat + lng] = marker;

      marker.bindPopup(popupHtml);
      marker.addTo(map);
    }

    map.on("click", e => {
      document.getElementById("lat").value = e.latlng.lat;
      document.getElementById("lng").value = e.latlng.lng;
      document.getElementById("coordsDisplay").textContent =
        e.latlng.lat.toFixed(5) + ", " + e.latlng.lng.toFixed(5);
    });

    document.getElementById("addMarkerBtn").onclick = () => {
      const lat = parseFloat(document.getElementById("lat").value);
      const lng = parseFloat(document.getElementById("lng").value);
      const title = document.getElementById("title").value;
      const description = document.getElementById("description").value;
      const category = document.getElementById("category").value;
      const archiveUrl = document.getElementById("archiveUrl").value;

      createUserMarker(lat, lng, {
        title,
        description,
        category,
        archiveUrl
      });
    };
  </script>
</body>
</html>
