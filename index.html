<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>APSE Sound Map – Lama dei Peligni</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
  html, body { margin:0; padding:0; height:100%; font-family:sans-serif; }
  #map { height:70vh; width:100%; }
  .controls { padding:1rem; background:#fff; }
  .badge-official {
    display:inline-block; background:#000; color:#fff;
    padding:4px 10px; border-radius:6px; font-size:0.75rem;
    margin-bottom:6px; font-weight:600;
  }
</style>
</head>

<body>

<div id="map"></div>

<div class="controls">
  <h2>APSE Ecological Sound Map – Lama dei Peligni</h2>
  <p>I marker ufficiali sono cerchi neri. Gli utenti possono aggiungere marker cliccando sulla mappa.</p>

  <label>Titolo</label><br>
  <input id="title" style="width:100%;"><br><br>

  <label>Descrizione</label><br>
  <textarea id="description" style="width:100%;"></textarea><br><br>

  <label>Archive.org URL</label><br>
  <input id="archiveUrl" style="width:100%;"><br><br>

  <button id="addMarker">Aggiungi marker utente</button>

  <p id="coords">Clicca sulla mappa per selezionare coordinate</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ---------------------------
// MAPPA
// ---------------------------
const map = L.map("map").setView([42.043, 14.188], 13);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

// ---------------------------
// MARKER UFFICIALI (20 BIOPHONY)
// ---------------------------
const RAW = "https://raw.githubusercontent.com/ApseProjectEU/apse-soundmap/main/sounds/biophony/";

const officialMarkers = [
  {"filename":"european-robin.mp3","title":"European Robin","description":"Melodious song","lat":42.042,"lng":14.188},
  {"filename":"common-redstart.mp3","title":"Common Redstart","description":"Warbling calls","lat":42.044,"lng":14.190},
  {"filename":"common-raven.mp3","title":"Common Raven","description":"Deep croaking","lat":42.048,"lng":14.185},
  {"filename":"great-tit.mp3","title":"Great Tit","description":"Two-syllable song","lat":42.040,"lng":14.192},
  {"filename":"common-kestrel.mp3","title":"Common Kestrel","description":"High-pitched calls","lat":42.046,"lng":14.182},
  {"filename":"peregrine-falcon.mp3","title":"Peregrine Falcon","description":"Sharp alarm calls","lat":42.050,"lng":14.188},
  {"filename":"golden-eagle.mp3","title":"Golden Eagle","description":"Majestic calls","lat":42.052,"lng":14.195},
  {"filename":"common-buzzard.mp3","title":"Common Buzzard","description":"Mewing calls","lat":42.038,"lng":14.186},
  {"filename":"dalmatian-woodpecker.mp3","title":"Dalmatian Woodpecker","description":"Drumming","lat":42.043,"lng":14.189},
  {"filename":"barn-swallow.mp3","title":"Barn Swallow","description":"Twittering","lat":42.041,"lng":14.187},
  {"filename":"house-martin.mp3","title":"House Martin","description":"Social calls","lat":42.042,"lng":14.190},
  {"filename":"eurasian-treecreeper.mp3","title":"Eurasian Treecreeper","description":"High-pitched song","lat":42.045,"lng":14.191},
  {"filename":"common-chaffinch.mp3","title":"Common Chaffinch","description":"Territorial song","lat":42.039,"lng":14.189},
  {"filename":"goldcrest.mp3","title":"Goldcrest","description":"Needle-thin calls","lat":42.047,"lng":14.187},
  {"filename":"eurasian-blackcap.mp3","title":"Eurasian Blackcap","description":"Melodious warbling","lat":42.044,"lng":14.193},
  {"filename":"red-deer-roaring.mp3","title":"Red Deer Roaring","description":"Rutting calls","lat":42.049,"lng":14.183},
  {"filename":"tree-frogs-river.mp3","title":"Tree Frogs","description":"Nocturnal chorus","lat":42.043,"lng":14.185},
  {"filename":"buzzards-crows-pine-forest.mp3","title":"Buzzards & Crows","description":"Interspecies calls","lat":42.046,"lng":14.194},
  {"filename":"hifi-soundscape-lama.mp3","title":"Hi-Fi Soundscape","description":"Full ecosystem","lat":42.041,"lng":14.191},
  {"filename":"river-forest-binaural.mp3","title":"River Forest Binaural","description":"Immersive river","lat":42.040,"lng":14.184}
];

officialMarkers.forEach(m => {
  const marker = L.circleMarker([m.lat, m.lng], {
    radius: 9,
    color: "#000",
    fillColor: "#000",
    fillOpacity: 1
  });

  const audioUrl = RAW + m.filename;

  marker.bindPopup(`
    <div class="badge-official">APSE Official Sound Marker</div>
    <b>${m.title}</b><br>
    ${m.description}<br><br>
    <audio controls style="width:100%;">
      <source src="${audioUrl}" type="audio/mpeg">
    </audio>
  `);

  marker.addTo(map);
});

// ---------------------------
// MARKER UTENTE
// ---------------------------
let selectedLat = null;
let selectedLng = null;

map.on("click", e => {
  selectedLat = e.latlng.lat;
  selectedLng = e.latlng.lng;
  document.getElementById("coords").innerText =
    "Coordinate: " + selectedLat.toFixed(5) + ", " + selectedLng.toFixed(5);
});

document.getElementById("addMarker").onclick = () => {
  if (!selectedLat) {
    alert("Clicca sulla mappa prima.");
    return;
  }

  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const url = document.getElementById("archiveUrl").value;

  const marker = L.circleMarker([selectedLat, selectedLng], {
    radius: 8,
    color: "#007bff",
    fillColor: "#007bff",
    fillOpacity: 0.9
  });

  marker.bindPopup(`
    <b>${title}</b><br>
    ${description}<br><br>
    <iframe src="https://archive.org/embed/${url.split('/').pop()}"
            width="100%" height="120"></iframe>
  `);

  marker.addTo(map);
};
</script>

</body>
</html>
